<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Inventario de Útiles de Aseo V2</title>
    <script>
      // Guardar la ruta original y redirigir a index.html
      var segmentCount = 1;
      var l = window.location;
      var path = l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash;
      l.replace(path);
    </script>
  </head>
  <body>
    <p>Redirigiendo...</p>
  </body>
</html>
