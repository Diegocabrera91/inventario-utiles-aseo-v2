name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: npx vite build --base /inventario-utiles-aseo-v2/ --config vite.config.ts
        env:
          NODE_ENV: production
          VITE_GOOGLE_SHEETS_API_URL: "https://script.google.com/macros/s/AKfycbxrC66DgEF0ztQz6aG6VGjPbHEqJN-mMeht8MTowjRCBdXR3js1NslCHQfpPAyRNARlDQ/exec"

      - name: Copy build to docs
        run: |
          rm -rf docs/assets
          cp -r dist/public/* docs/

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "ci: rebuild docs para GitHub Pages"
          git push
